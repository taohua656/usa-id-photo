workflows:
  build-ios:
    name: Build iOS Release IPA
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      xcode: latest
    scripts:
      - name: Build and package IPA
        script: |
          flutter build ios --release --no-codesign
          mkdir Payload
          cp -r build/ios/Release-iphoneos/Runner.app Payload
          zip -r UsaIdPhoto_Release.ipa Payload
          rm -rf Payload
    artifacts:
      - UsaIdPhoto_Release.ipa
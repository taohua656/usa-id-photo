workflows:
  build-ios:
    name: Build iOS Debug IPA
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      xcode: latest
    scripts:
      - name: Build and package IPA
        script: |
          flutter build ios --debug --no-codesign
          mkdir Payload
          cp -r build/ios/Debug-iphoneos/Runner.app Payload
          zip -r Debug.ipa Payload
    artifacts:
      - Debug.ipa
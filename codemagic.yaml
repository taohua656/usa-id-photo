name: Flutter iOS Build
workflows:
  ios_release:
    environment:
      flutter: 3.41.6
      ruby: 3.2.2
      # 不写xcode，自动选择
    scripts:
      - name: 清理并固定CocoaPods版本
        script: |
          gem uninstall cocoapods --all --force
          gem install cocoapods -v 1.15.2 --no-document
          cd ios
          pod deintegrate
          pod install --repo-update
      - name: 编译iOS不签名
        script: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
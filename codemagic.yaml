workflows:
  ios-release:
    name: Build iOS IPA
    environment:
      flutter: 3.41.6
      ruby: 3.2.2
    scripts:
      - name: Prepare Flutter dependencies
        script: |
          set -e
          flutter clean
          flutter pub get  # 先执行 pub get，生成 Generated.xcconfig
      - name: Install Bundler & Dependencies
        script: |
          set -e
          cd ios
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3
          pod deintegrate
          pod install --repo-update
      - name: Build Flutter iOS
        script: |
          set -e
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
workflows:
  ios-debug-device:
    name: iOS Debug (Real Device)
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6  # 和你当前版本完全对齐
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Build iOS Debug for real device (no codesign)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/Debug-iphoneos/*.ipa  # 真机 Debug 安装包
      - /tmp/xcodebuild_logs/*.log       # 构建日志（方便排错）
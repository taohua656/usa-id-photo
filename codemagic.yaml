workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6  # 保持你本地版本
      # 不写 xcode 版本，让 Codemagic 自动选
      cocoapods: default
    scripts:
      - name: Clean cache
        script: rm -rf build/ ios/Pods ios/Podfile.lock
      - name: Flutter pub get
        script: flutter pub get
      - name: Build IPA
        script: flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    
workflows:
  ios-debug-device:
    name: iOS Debug (Real Device)
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Build & package iOS Debug IPA
        script: |
          flutter build ios --debug --no-codesign
          # 手动创建 Payload 目录并打包成 .ipa
          mkdir -p build/ios/Payload
          cp -r build/ios/Debug-iphoneos/Runner.app build/ios/Payload/
          cd build/ios
          zip -r ipa/Runner.ipa Payload/
          # 验证产物
          ls -la ipa/
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
name: Flutter iOS Auto Build
workflows:
  ios_release:
    environment:
      flutter: 3.41.6
    scripts:
      - name: Clean & Regenerate iOS
        script: |
          flutter clean
          flutter pub get
          flutter create --platforms ios .
      - name: Build unsigned IPA
        script: |
          flutter build ipa --release --no-codesign \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa      
workflows:
  build-ios:
    name: Build iOS Release IPA
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.6
      xcode: latest
      cocoapods: "1.15.2"
    scripts:
      - name: Set up dependencies
        script: |
          flutter pub get
      - name: Fix CocoaPods conflict
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod cache clean --all
          pod install --repo-update
      - name: Build and package IPA
        script: |
          flutter build ios --release --no-codesign
          mkdir Payload
          cp -r build/ios/Release-iphoneos/Runner.app Payload
          zip -r UsaIdPhoto_Release.ipa Payload
          rm -rf Payload
    artifacts:
      - UsaIdPhoto_Release.ipa